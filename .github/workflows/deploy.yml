name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --- Web / App EC2: Flask API, Postgres, Redis broker, MinIO/S3-sidecar (or point to AWS S3). ---
  # No Ollama and no GPU Celery workers on this host. Migrations run here.
  deploy-web:
    name: Deploy web / app tier
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ SERVER_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ SERVER_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ SERVER_SSH_KEY secret is not set"
            exit 1
          fi
          echo "✅ Web server SSH secrets are set"

      - name: Deploy web stack to SERVER_HOST
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/ai-grader/AGT_platform || { echo "❌ Missing /opt/ai-grader/AGT_platform"; exit 1; }
            git pull origin main
            STACK='${{ secrets.DEPLOY_STACK }}'
            if [ -z "$STACK" ]; then STACK=monolith; fi
            echo "📦 Deploy stack mode: $STACK"

            if [ "$STACK" = "split" ]; then
              COMPOSE_FILE=docker-compose.web.prod.yaml
            else
              COMPOSE_FILE=docker-compose.prod.yaml
            fi

            echo "🐳 Web tier ($COMPOSE_FILE) — no Ollama / no GPU workers on this host"
            docker compose -f "$COMPOSE_FILE" --env-file .env.production pull
            docker compose -f "$COMPOSE_FILE" --env-file .env.production up -d --build
            echo "⏳ Waiting for backend…"
            sleep 12
            echo "📊 Database migrations (backend container on web tier)…"
            docker exec ai_grader_backend_prod python -m alembic upgrade head || true
            docker compose -f "$COMPOSE_FILE" --env-file .env.production restart backend
            echo "✅ Web / app deploy complete"

  # --- GPU EC2: Ollama + Celery worker only. Private subnet; pull models here only. ---
  deploy-gpu:
    name: Deploy GPU inference tier
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.DEPLOY_STACK == 'split' &&
      secrets.GPU_SERVER_HOST != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy GPU stack to GPU_SERVER_HOST
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GPU_SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            cd /opt/ai-grader/AGT_platform || { echo "❌ Missing /opt/ai-grader/AGT_platform"; exit 1; }
            git pull origin main
            echo "🐳 GPU tier (docker-compose.gpu.prod.yaml) — Ollama + worker only"
            docker compose -f docker-compose.gpu.prod.yaml --env-file .env.production.gpu pull
            docker compose -f docker-compose.gpu.prod.yaml --env-file .env.production.gpu up -d --build
            sleep 10
            echo "🤖 Ollama model pull on GPU host (match OLLAMA_MODEL in .env.production.gpu)…"
            docker exec ai_grader_ollama_prod ollama pull llama3.2:3b || true
            docker compose -f docker-compose.gpu.prod.yaml --env-file .env.production.gpu restart worker
            echo "✅ GPU deploy complete"

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Cloudflare Secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-grader-frontend
          directory: AGT_platform/frontend
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Skip Frontend Deployment (if secrets missing)
        if: steps.check-secrets.outputs.secrets_available != 'true'
        run: echo "⏭️ Skipping Cloudflare Pages (secrets not set). Set VITE_API_BASE in Pages build env."
